name: 議事録処理

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Drive file ID of the recording'
        required: true
      file_name:
        description: 'Original file name'
        required: true
      client_name:
        description: 'Client name'
        required: false
        default: ''
      meeting_date:
        description: 'Meeting date (e.g. 2026年5月14日)'
        required: false
        default: ''

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-large-v3

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup service account
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Setup config
        run: |
          cat << EOF > config_minutes.json
          {
            "gemini_api_key": "${{ secrets.GEMINI_API_KEY }}",
            "gemini_model": "gemini-2.5-flash",
            "whisper_model": "large-v3",
            "whisper_device": "cpu",
            "whisper_compute_type": "int8",
            "parent_folder_id": "${{ secrets.DRIVE_FOLDER_ID }}",
            "subfolder_recording": "録音",
            "subfolder_done": "処理済み",
            "subfolder_transcript": "文字起こし",
            "subfolder_output": "出力",
            "service_account_file": "service_account.json"
          }
          EOF

      - name: Process recording
        run: |
          python meeting_minutes_ci.py \
            --file-id "${{ github.event.inputs.file_id }}" \
            --file-name "${{ github.event.inputs.file_name }}" \
            --client-name "${{ github.event.inputs.client_name }}" \
            --meeting-date "${{ github.event.inputs.meeting_date }}"
